{% extends "layout/base.html" %}

{% block title %}
Book Appointment
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h3 class="fw-bold">
                <i class="fa-solid fa-calendar-plus text-primary"></i>
                Book Appointment
            </h3>

            <p class="text-muted mb-0">
                Schedule a new patient appointment
            </p>

        </div>

        <a href="{{ url_for('appointment.list_appointments') }}"
           class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left"></i>
            Back

        </a>

    </div>

    <div class="card shadow-sm border-0">

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <!-- Patient -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Patient
                        </label>

                        <select class="form-select"
                                name="patient_id"
                                required>

                            <option value="">
                                Select Patient
                            </option>

                            {% for patient in patients %}

                            <option value="{{ patient.id }}">

                                {{ patient.patient_code }}
                                -
                                {{ patient.user.full_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Doctor -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Doctor
                        </label>

                        <select class="form-select"
                                name="doctor_id"
                                required>

                            <option value="">
                                Select Doctor
                            </option>

                            {% for doctor in doctors %}

                            <option value="{{ doctor.id }}">

                                Dr.
                                {{ doctor.user.full_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Appointment Date
                        </label>

                        <input
                                type="date"
                                name="appointment_date"
                                class="form-control"
                                required>

                    </div>

                    <!-- Time -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Appointment Time
                        </label>

                        <input
                                type="time"
                                name="appointment_time"
                                class="form-control"
                                required>

                    </div>

                    <!-- Visit Type -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Visit Type
                        </label>

                        <select
                                class="form-select"
                                name="visit_type">

                            <option value="OPD">
                                OPD
                            </option>

                            <option value="IPD">
                                IPD
                            </option>

                        </select>

                    </div>

                    <!-- Fee -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Consultation Fee
                        </label>

                        <input
                                type="number"
                                step="0.01"
                                min="0"
                                name="fee"
                                class="form-control"
                                value="0">

                    </div>

                    <!-- Status -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Status
                        </label>

                        <select
                                class="form-select"
                                name="status">

                            <option value="Pending">
                                Pending
                            </option>

                            <option value="Confirmed">
                                Confirmed
                            </option>

                            <option value="Completed">
                                Completed
                            </option>

                            <option value="Cancelled">
                                Cancelled
                            </option>

                        </select>

                    </div>

                    <!-- Reason -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Reason
                        </label>

                        <input
                                type="text"
                                class="form-control"
                                name="reason">

                    </div>

                    <!-- Remarks -->

                    <div class="col-12 mb-3">

                        <label class="form-label">
                            Remarks
                        </label>

                        <textarea
                                class="form-control"
                                rows="4"
                                name="remarks"></textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button
                            type="submit"
                            class="btn btn-primary">

                        <i class="fa-solid fa-save"></i>
                        Book Appointment

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
