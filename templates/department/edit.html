{% extends "layout/base.html" %}

{% block title %}
Edit Department
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-header bg-warning">

                    <h4 class="mb-0">

                        <i class="fas fa-pen me-2"></i>

                        Edit Department

                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Department Name

                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ department.name }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Description

                            </label>

                            <textarea
                                name="description"
                                class="form-control"
                                rows="5">{{ department.description }}</textarea>

                        </div>

                        <div class="form-check form-switch mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="status"
                                {% if department.status %}checked{% endif %}>

                            <label class="form-check-label">

                                Active Department

                            </label>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('department.list_departments') }}"
                               class="btn btn-secondary">

                                <i class="fas fa-arrow-left me-2"></i>

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning">

                                <i class="fas fa-save me-2"></i>

                                Update Department

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
