{% extends "layout/base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header">

                    <h3 class="text-center">

                        Patient Registration

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label>Full Name</label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>


                        <div class="mb-3">
    <label>Confirm Password</label>

    <input
        type="password"
        name="confirm_password"
        class="form-control"
        required>
</div>

                        <button
                            class="btn btn-primary w-100">

                            Register

                        </button>

                    </form>

                    <div class="mt-3 text-center">

                        Already have an account?

                        <a href="{{ url_for('auth.login') }}">

                            Login

                        </a>

                    </div>

                </div>

            </div>


        </div>

    </div>

</div>

{% endblock %}
