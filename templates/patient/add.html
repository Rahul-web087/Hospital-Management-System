{% extends "layout/base.html" %}

{% block title %}
Add Patient
{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">

                        <i class="fas fa-user-plus me-2"></i>

                        Register New Patient

                    </h3>

                </div>

                <div class="card-body">

                    <form
                        method="POST"
                        enctype="multipart/form-data">

                        <!-- ===================== -->
                        <!-- Personal Information -->
                        <!-- ===================== -->

                        <h5 class="mb-3 text-primary">

                            Personal Information

                        </h5>

                        <div class="row">

                            <div class="col-md-3 text-center mb-4">

                                <img
                                    src="{{ url_for('static', filename='uploads/patients/default-patient.png') }}"
                                    id="preview"
                                    class="rounded-circle border shadow"
                                    width="170"
                                    height="170">

                                <div class="mt-3">

                                    <input
                                        type="file"
                                        class="form-control"
                                        name="photo"
                                        id="photo">

                                </div>

                            </div>

                            <div class="col-md-9">

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Full Name

                                        </label>

                                        <input
                                            type="text"
                                            name="full_name"
                                            class="form-control"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Email

                                        </label>

                                        <input
                                            type="email"
                                            name="email"
                                            class="form-control"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Phone

                                        </label>

                                        <input
                                            type="text"
                                            name="phone"
                                            class="form-control">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Gender

                                        </label>

                                        <select
                                            class="form-select"
                                            name="gender">

                                            <option value="Male">
                                                Male
                                            </option>

                                            <option value="Female">
                                                Female
                                            </option>

                                            <option value="Other">
                                                Other
                                            </option>

                                        </select>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Date of Birth

                                        </label>

                                        <input
                                            type="date"
                                            name="date_of_birth"
                                            class="form-control">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Blood Group

                                        </label>

                                        <select
                                            class="form-select"
                                            name="blood_group">

                                            <option>A+</option>
                                            <option>A-</option>
                                            <option>B+</option>
                                            <option>B-</option>
                                            <option>AB+</option>
                                            <option>AB-</option>
                                            <option>O+</option>
                                            <option>O-</option>

                                        </select>

                                    </div>

                                    <div class="col-12">

                                        <label class="form-label">

                                            Address

                                        </label>

                                        <textarea
                                            class="form-control"
                                            rows="3"
                                            name="address"></textarea>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <hr class="my-4">
                                                <!-- ===================== -->
                        <!-- Emergency Information -->
                        <!-- ===================== -->

                        <h5 class="mb-3 text-primary">

                            Emergency Contact

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Emergency Contact Name

                                </label>

                                <input
                                    type="text"
                                    name="emergency_contact"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Emergency Contact Number

                                </label>

                                <input
                                    type="text"
                                    name="emergency_phone"
                                    class="form-control">

                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- ===================== -->
                        <!-- Medical Information -->
                        <!-- ===================== -->

                        <h5 class="mb-3 text-primary">

                            Medical Information

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Medical History

                                </label>

                                <textarea
                                    class="form-control"
                                    rows="4"
                                    name="medical_history"
                                    placeholder="Previous diseases, surgeries, etc."></textarea>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Allergies

                                </label>

                                <textarea
                                    class="form-control"
                                    rows="4"
                                    name="allergies"
                                    placeholder="Medicine or food allergies"></textarea>

                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- ===================== -->
                        <!-- Insurance -->
                        <!-- ===================== -->

                        <h5 class="mb-3 text-primary">

                            Insurance Details

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Insurance Provider

                                </label>

                                <input
                                    type="text"
                                    name="insurance_provider"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Insurance Number

                                </label>

                                <input
                                    type="text"
                                    name="insurance_number"
                                    class="form-control">

                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- ===================== -->
                        <!-- Status -->
                        <!-- ===================== -->

                        <div class="row">

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Patient Status

                                </label>

                                <select
                                    class="form-select"
                                    name="status">

                                    <option value="1" selected>

                                        Active

                                    </option>

                                    <option value="0">

                                        Inactive

                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- Buttons -->

                        <div class="d-flex justify-content-end gap-2">

                            <a
                                href="{{ url_for('patient.list_patients') }}"
                                class="btn btn-secondary">

                                <i class="fas fa-arrow-left me-2"></i>

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">

                                <i class="fas fa-save me-2"></i>

                                Save Patient

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- JavaScript -->
<!-- ===================== -->

<script>

document
.getElementById("photo")
.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document
            .getElementById("preview")
            .src = event.target.result;

        };

        reader.readAsDataURL(file);

    }

});

</script>

{% endblock %}
