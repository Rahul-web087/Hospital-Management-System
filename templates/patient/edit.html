{% extends "layout/base.html" %}

{% block title %}
Edit Patient
{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow border-0">

                <div class="card-header bg-warning text-dark">

                    <h3 class="mb-0">

                        <i class="fas fa-user-edit me-2"></i>

                        Edit Patient

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST"
                          enctype="multipart/form-data">

                        <!-- Personal Information -->

                        <h5 class="text-primary mb-3">

                            Personal Information

                        </h5>

                        <div class="row">

                            <div class="col-md-3 text-center">

                                <img
                                    id="preview"
                                    src="{{ url_for('static', filename='uploads/patients/' + patient.photo) }}"
                                    class="rounded-circle border shadow"
                                    width="170"
                                    height="170">

                                <div class="mt-3">

                                    <input
                                        type="file"
                                        name="photo"
                                        id="photo"
                                        class="form-control">

                                </div>

                            </div>

                            <div class="col-md-9">

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Full Name

                                        </label>

                                        <input
                                            type="text"
                                            class="form-control"
                                            name="full_name"
                                            value="{{ patient.user.full_name }}"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Email

                                        </label>

                                        <input
                                            type="email"
                                            class="form-control"
                                            name="email"
                                            value="{{ patient.user.email }}"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Phone

                                        </label>

                                        <input
                                            type="text"
                                            class="form-control"
                                            name="phone"
                                            value="{{ patient.user.phone }}">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Gender

                                        </label>

                                        <select
                                            class="form-select"
                                            name="gender">

                                            <option value="Male"
                                                {% if patient.user.gender=="Male" %}
                                                selected
                                                {% endif %}>
                                                Male
                                            </option>

                                            <option value="Female"
                                                {% if patient.user.gender=="Female" %}
                                                selected
                                                {% endif %}>
                                                Female
                                            </option>

                                            <option value="Other"
                                                {% if patient.user.gender=="Other" %}
                                                selected
                                                {% endif %}>
                                                Other
                                            </option>

                                        </select>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Date of Birth

                                        </label>

                                        <input
                                            type="date"
                                            class="form-control"
                                            name="date_of_birth"
                                            value="{{ patient.user.date_of_birth }}">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Blood Group

                                        </label>

                                        <select
                                            class="form-select"
                                            name="blood_group">

                                            <option value="A+" {% if patient.blood_group=="A+" %}selected{% endif %}>A+</option>

                                            <option value="A-" {% if patient.blood_group=="A-" %}selected{% endif %}>A-</option>

                                            <option value="B+" {% if patient.blood_group=="B+" %}selected{% endif %}>B+</option>

                                            <option value="B-" {% if patient.blood_group=="B-" %}selected{% endif %}>B-</option>

                                            <option value="AB+" {% if patient.blood_group=="AB+" %}selected{% endif %}>AB+</option>

                                            <option value="AB-" {% if patient.blood_group=="AB-" %}selected{% endif %}>AB-</option>

                                            <option value="O+" {% if patient.blood_group=="O+" %}selected{% endif %}>O+</option>

                                            <option value="O-" {% if patient.blood_group=="O-" %}selected{% endif %}>O-</option>

                                        </select>

                                    </div>

                                    <div class="col-12 mb-4">

                                        <label class="form-label">

                                            Address

                                        </label>

                                        <textarea
                                            class="form-control"
                                            rows="3"
                                            name="address">{{ patient.user.address }}</textarea>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <hr class="my-4">
                                                <!-- ===================== -->
                        <!-- Emergency Contact -->
                        <!-- ===================== -->

                        <h5 class="text-primary mb-3">

                            Emergency Contact

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Emergency Contact Name

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="emergency_contact"
                                    value="{{ patient.emergency_contact }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Emergency Contact Number

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="emergency_phone"
                                    value="{{ patient.emergency_phone }}">

                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- ===================== -->
                        <!-- Medical Information -->
                        <!-- ===================== -->

                        <h5 class="text-primary mb-3">

                            Medical Information

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Medical History

                                </label>

                                <textarea
                                    class="form-control"
                                    rows="5"
                                    name="medical_history">{{ patient.medical_history }}</textarea>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Allergies

                                </label>

                                <textarea
                                    class="form-control"
                                    rows="5"
                                    name="allergies">{{ patient.allergies }}</textarea>

                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- ===================== -->
                        <!-- Insurance -->
                        <!-- ===================== -->

                        <h5 class="text-primary mb-3">

                            Insurance Details

                        </h5>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Insurance Provider

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="insurance_provider"
                                    value="{{ patient.insurance_provider }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Insurance Number

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="insurance_number"
                                    value="{{ patient.insurance_number }}">

                            </div>

                        </div>

                        <hr class="my-4">

                        <!-- ===================== -->
                        <!-- Status -->
                        <!-- ===================== -->

                        <div class="row">

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Patient Status

                                </label>

                                <select
                                    class="form-select"
                                    name="status">

                                    <option
                                        value="1"
                                        {% if patient.status %}
                                        selected
                                        {% endif %}>

                                        Active

                                    </option>

                                    <option
                                        value="0"
                                        {% if not patient.status %}
                                        selected
                                        {% endif %}>

                                        Inactive

                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- Buttons -->

                        <div class="d-flex justify-content-end gap-2">

                            <a
                                href="{{ url_for('patient.list_patients') }}"
                                class="btn btn-secondary">

                                <i class="fas fa-arrow-left me-2"></i>

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning">

                                <i class="fas fa-save me-2"></i>

                                Update Patient

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
<!-- ===================== -->
<!-- JavaScript -->
<!-- ===================== -->

<script>

document
.getElementById("photo")
.addEventListener("change", function (e) {

    const file = e.target.files[0];

    if (file) {

        const reader = new FileReader();

        reader.onload = function (event) {

            document
            .getElementById("preview")
            .src = event.target.result;

        };

        reader.readAsDataURL(file);

    }

});

</script>

{% endblock %}
