{% extends "layout/base.html" %}

{% block title %}
Add Prescription
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="fw-bold">
            <i class="fa-solid fa-file-prescription text-primary"></i>
            New Prescription
        </h3>

        <a href="{{ url_for('prescription.list_prescriptions') }}"
           class="btn btn-secondary">

            <i class="fa fa-arrow-left"></i>
            Back

        </a>

    </div>

    <div class="card shadow border-0">

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <!-- Appointment -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Appointment
                        </label>

                        <select name="appointment_id"
                                class="form-select"
                                required>

                            <option value="">Select Appointment</option>

                            {% for appointment in appointments %}

                            <option value="{{ appointment.id }}">

                                {{ appointment.appointment_no }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Patient -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Patient
                        </label>

                        <select name="patient_id"
                                class="form-select"
                                required>

                            <option value="">Select Patient</option>

                            {% for patient in patients %}

                            <option value="{{ patient.id }}">

                                {{ patient.patient_code }}
                                -
                                {{ patient.user.full_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Doctor -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Doctor
                        </label>

                        <select name="doctor_id"
                                class="form-select"
                                required>

                            <option value="">Select Doctor</option>

                            {% for doctor in doctors %}

                            <option value="{{ doctor.id }}">

                                Dr. {{ doctor.user.full_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Diagnosis -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Diagnosis

                        </label>

                        <textarea
                            name="diagnosis"
                            class="form-control"
                            rows="3"
                            required></textarea>

                    </div>

                    <!-- Symptoms -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Symptoms

                        </label>

                        <textarea
                            name="symptoms"
                            class="form-control"
                            rows="3"></textarea>

                    </div>

                    <!-- Follow Up -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Follow Up Date

                        </label>

                        <input
                            type="date"
                            name="follow_up_date"
                            class="form-control">

                    </div>

                    <!-- Status -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Status

                        </label>

                        <select
                            name="status"
                            class="form-select">

                            <option value="Active">

                                Active

                            </option>

                            <option value="Completed">

                                Completed

                            </option>

                            <option value="Cancelled">

                                Cancelled

                            </option>

                        </select>

                    </div>

                    <!-- Notes -->

                    <div class="col-12 mb-4">

                        <label class="form-label">

                            Doctor Notes

                        </label>

                        <textarea
                            name="notes"
                            class="form-control"
                            rows="4"></textarea>

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h5>

                        Medicines

                    </h5>

                    <button
                        type="button"
                        class="btn btn-success"
                        onclick="addMedicine()">

                        <i class="fa fa-plus"></i>

                        Add Medicine

                    </button>

                </div>

                <div class="table-responsive">

                    <table class="table table-bordered"
                           id="medicineTable">

                        <thead class="table-light">

                        <tr>

                            <th>Medicine</th>

                            <th>Dosage</th>

                            <th>Frequency</th>

                            <th>Duration</th>

                            <th>Instructions</th>

                            <th width="60"></th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr>

                            <td>

                                <input
                                    name="medicine_name[]"
                                    class="form-control"
                                    required>

                            </td>

                            <td>

                                <input
                                    name="dosage[]"
                                    class="form-control">

                            </td>

                            <td>

                                <input
                                    name="frequency[]"
                                    class="form-control"
                                    placeholder="1-0-1">

                            </td>

                            <td>

                                <input
                                    name="duration[]"
                                    class="form-control"
                                    placeholder="5 Days">

                            </td>

                            <td>

                                <input
                                    name="instructions[]"
                                    class="form-control">

                            </td>

                            <td>

                                <button
                                    type="button"
                                    class="btn btn-danger"
                                    onclick="removeRow(this)">

                                    <i class="fa fa-trash"></i>

                                </button>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <hr>

                <div class="text-end">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="fa fa-save"></i>

                        Save Prescription

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}

{% block js %}

<script>

function addMedicine(){

    let table=document.querySelector("#medicineTable tbody");

    table.insertAdjacentHTML("beforeend",`

<tr>

<td><input name="medicine_name[]" class="form-control" required></td>

<td><input name="dosage[]" class="form-control"></td>

<td><input name="frequency[]" class="form-control"></td>

<td><input name="duration[]" class="form-control"></td>

<td><input name="instructions[]" class="form-control"></td>

<td>

<button type="button"
class="btn btn-danger"
onclick="removeRow(this)">

<i class="fa fa-trash"></i>

</button>

</td>

</tr>

`);

}

function removeRow(btn){

    let rows=document.querySelectorAll("#medicineTable tbody tr");

    if(rows.length>1){

        btn.closest("tr").remove();

    }

}

</script>

{% endblock %}
