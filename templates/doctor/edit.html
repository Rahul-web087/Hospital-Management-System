{% extends "layout/base.html" %}

{% block title %}
Edit Doctor
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="mb-0">

                        <i class="fas fa-user-edit me-2"></i>

                        Edit Doctor

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST"
                          enctype="multipart/form-data">

                        <div class="row">

                            <div class="col-md-12 text-center mb-4">

                                <img src="{{ url_for('static', filename='uploads/doctors/' + doctor.photo) }}"
                                     width="150"
                                     height="150"
                                     class="rounded-circle border shadow"
                                     style="object-fit:cover;">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    name="full_name"
                                    class="form-control"
                                    value="{{ doctor.user.full_name }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    value="{{ doctor.user.email }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone

                                </label>

                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control"
                                    value="{{ doctor.user.phone }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Department

                                </label>

                                <select
                                    name="department_id"
                                    class="form-select">

                                    {% for department in departments %}

                                    <option value="{{ department.id }}"
                                    {% if doctor.department_id == department.id %}
                                    selected
                                    {% endif %}>

                                        {{ department.name }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Qualification

                                </label>

                                <input
                                    type="text"
                                    name="qualification"
                                    class="form-control"
                                    value="{{ doctor.qualification }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Specialization

                                </label>

                                <input
                                    type="text"
                                    name="specialization"
                                    class="form-control"
                                    value="{{ doctor.specialization }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Experience

                                </label>

                                <input
                                    type="number"
                                    name="experience"
                                    class="form-control"
                                    value="{{ doctor.experience }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Consultation Fee

                                </label>

                                <input
                                    type="number"
                                    name="consultation_fee"
                                    class="form-control"
                                    value="{{ doctor.consultation_fee }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Available Days

                                </label>

                                <input
                                    type="text"
                                    name="available_days"
                                    class="form-control"
                                    value="{{ doctor.available_days }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Available Time

                                </label>

                                <input
                                    type="text"
                                    name="available_time"
                                    class="form-control"
                                    value="{{ doctor.available_time }}">

                            </div>

                            <div class="col-md-12 mb-3">

                                <label class="form-label">

                                    Address

                                </label>

                                <textarea
                                    name="address"
                                    rows="4"
                                    class="form-control">{{ doctor.address }}</textarea>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Change Photo

                                </label>

                                <input
                                    type="file"
                                    name="photo"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label">

                                    Status

                                </label>

                                <select
                                    name="status"
                                    class="form-select">

                                    <option value="1"
                                    {% if doctor.status %}selected{% endif %}>
                                        Active
                                    </option>

                                    <option value="0"
                                    {% if not doctor.status %}selected{% endif %}>
                                        Inactive
                                    </option>

                                </select>

                            </div>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('doctor.list_doctors') }}"
                               class="btn btn-secondary">

                                Back

                            </a>

                            <button
                                class="btn btn-warning"
                                type="submit">

                                Update Doctor

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
